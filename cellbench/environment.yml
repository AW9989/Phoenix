name: phoenix
channels:
  - conda-forge
dependencies:
  # Pin Python for PyBaMM/CasADi wheel availability on Windows/macOS.
  # A lower bound such as python>=3.12 may resolve to a too-new interpreter.
  - python=3.12
  - numpy
  - pandas
  - scipy
  - matplotlib
  - streamlit>=1.58
  - pip
  - pip:
      - pybamm==26.6.2.0
